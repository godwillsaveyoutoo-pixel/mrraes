<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wiskundespellen - Mr. Raes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 50px;
      animation: fadeInDown 0.6s ease;
    }

    header h1 {
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    header p {
      font-size: 1.2em;
      opacity: 0.95;
    }

    .search-box {
      margin: 30px 0;
      text-align: center;
    }

    .search-box input {
      width: 100%;
      max-width: 400px;
      padding: 12px 20px;
      font-size: 1em;
      border: none;
      border-radius: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 2px solid white;
      background: rgba(255,255,255,0.2);
      color: white;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9em;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: white;
      color: #667eea;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 50px;
    }

    .game-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      cursor: pointer;
      animation: fadeInUp 0.6s ease;
      display: flex;
      flex-direction: column;
    }

    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
    }

    .game-card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      color: white;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .game-card-body {
      padding: 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .game-card-title {
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }

    .game-card-desc {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 15px;
      flex-grow: 1;
    }

    .game-card-meta {
      font-size: 0.8em;
      color: #999;
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: #f0f0f0;
      border-radius: 12px;
      font-size: 0.8em;
    }

    .badge.level1 { background: #d4edda; color: #155724; }
    .badge.level2 { background: #fff3cd; color: #856404; }

    .play-btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      font-size: 1em;
    }

    .play-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .empty-state {
      text-align: center;
      color: white;
      padding: 50px 20px;
    }

    .empty-state h2 {
      font-size: 1.5em;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      color: white;
      padding: 30px;
      opacity: 0.8;
      border-top: 1px solid rgba(255,255,255,0.2);
      margin-top: 50px;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .stats {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 1.1em;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2em;
      }

      .game-grid {
        grid-template-columns: 1fr;
      }

      .filters {
        flex-direction: column;
      }

      .filter-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎮 Wiskundespellen</h1>
      <p>Leren door te spelen - Mr. Raes</p>
    </header>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 Zoek een spel...">
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Alle spellen</button>
      <button class="filter-btn" data-filter="1ljb">1LJB</button>
      <button class="filter-btn" data-filter="2b">2B</button>
      <button class="filter-btn" data-filter="mixed">Gemengd</button>
    </div>

    <div class="stats">
      <span id="gameCount">20+ spellen</span> beschikbaar
    </div>

    <div class="game-grid" id="gameGrid"></div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <h2>Geen spellen gevonden</h2>
      <p>Probeer een ander zoekwoord of filter</p>
    </div>

    <footer>
      <p>© 2026 Mr. Raes - Wiskundespellen Platform</p>
      <p><small>Gemaakt met ❤️ voor beter leren</small></p>
    </footer>
  </div>

  <script>
    const games = [
      // Getallen (1LJB)
      { id: 1, name: "Getallen - Afronden", file: "Getallen - Afronden (1LJB).html", category: "Getallen", level: "1LJB", tags: ["1ljb", "getallen", "afronden"] },
      { id: 2, name: "Getallenas", file: "Getallen - Getallenas (1LJB).html", category: "Getallen", level: "1LJB", tags: ["1ljb", "getallen", "tellen"] },
      { id: 3, name: "Munten", file: "Getallen - Munten (1LJB).html", category: "Getallen", level: "1LJB", tags: ["1ljb", "getallen", "munten"] },
      { id: 4, name: "Getallen Vergelijken", file: "Getallen - Vergelijken (1LJB).html", category: "Getallen", level: "1LJB", tags: ["1ljb", "getallen", "vergelijken"] },

      // Breuken (2B)
      { id: 5, name: "Breuken Optellen", file: "Breuken - Breuken optellen (2B).html", category: "Breuken", level: "2B", tags: ["2b", "breuken", "optellen"] },
      { id: 6, name: "Gelijkwaardig, Vereenvoudigen & Deel Van", file: "Breuken - Gelijkwaardig, Vereenvoudigen en Deel Van (2B).html", category: "Breuken", level: "2B", tags: ["2b", "breuken", "gelijkwaardig"] },

      // Delers & Veelvouden (2B)
      { id: 7, name: "Delers en Veelvouden", file: "Delers en Veelvouden - delers en veelvouden (2B).html", category: "Delers & Veelvouden", level: "2B", tags: ["2b", "delers", "veelvouden"] },

      // Lengte & Oppervlakte (gemengd)
      { id: 8, name: "Het Grote Lengtespel", file: "Lengte en Oppervlakte - Het Grote Lengtespel (2B - 1LJB).html", category: "Lengte & Oppervlakte", level: "Gemengd", tags: ["mixed", "lengte", "omzetten"] },
      { id: 9, name: "Omtrek & Oppervlaktespel", file: "Lengte en Oppervlakte - Het grote omtrek- en oppervlaktespel  (2B).html", category: "Lengte & Oppervlakte", level: "2B", tags: ["2b", "oppervlakte", "omtrek"] },
      { id: 10, name: "Lengte Omzetten", file: "Lengte en Oppervlakte - Lengte Omzetten  (2B - 1LJB).html", category: "Lengte & Oppervlakte", level: "Gemengd", tags: ["mixed", "lengte", "omzetten"] },
      { id: 11, name: "Omtrek & Oppervlakte Maken", file: "Lengte en Oppervlakte - Omtrek en Oppervlakte maken  (2B).html", category: "Lengte & Oppervlakte", level: "2B", tags: ["2b", "oppervlakte"] },
      { id: 12, name: "Oppervlakte Omzetten", file: "Lengte en Oppervlakte - Oppervlakte Omzetten  (2B).html", category: "Lengte & Oppervlakte", level: "2B", tags: ["2b", "oppervlakte"] },

      // Procenten (2B)
      { id: 13, name: "Procenten Omzetten", file: "Procenten - Omzetten (2B).html", category: "Procenten", level: "2B", tags: ["2b", "procenten", "omzetten"] },
      { id: 14, name: "Procentenspel", file: "Procenten - Procentenspel (2B).html", category: "Procenten", level: "2B", tags: ["2b", "procenten"] },

      // Rekenen (1LJB)
      { id: 15, name: "Rekenmix", file: "Rekenen - Rekenmix (1LJB).html", category: "Rekenen", level: "1LJB", tags: ["1ljb", "rekenen", "mix"] },
      { id: 16, name: "Schatten", file: "Rekenen - Schatten (1LJB).html", category: "Rekenen", level: "1LJB", tags: ["1ljb", "rekenen", "schatten"] },
      { id: 17, name: "Zinvol Afronden", file: "Rekenen - Zinvol afronden (1LJB).html", category: "Rekenen", level: "1LJB", tags: ["1ljb", "rekenen", "afronden"] },

      // Overig
      { id: 18, name: "Allerlei - Dierenspel", file: "Allerlei - Dierenspel.html", category: "Overig", level: "Gemengd", tags: ["mixed", "dieren"] },
      { id: 19, name: "Inhoud", file: "inhoud (1LJB).html", category: "Overig", level: "1LJB", tags: ["1ljb", "inhoud"] },
    ];

    let currentFilter = 'all';

    const gameGrid = document.getElementById('gameGrid');
    const searchInput = document.getElementById('searchInput');
    const filterButtons = document.querySelectorAll('.filter-btn');
    const emptyState = document.getElementById('emptyState');

    function renderGames(filtered = games) {
      gameGrid.innerHTML = '';
      emptyState.style.display = filtered.length === 0 ? 'block' : 'none';

      filtered.forEach((game, index) => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.style.animationDelay = `${index * 0.05}s`;

        const levelBadge = game.level === '1LJB' ? 'level1' : game.level === '2B' ? 'level2' : '';

        card.innerHTML = `
          <div class="game-card-header">
            <div class="game-card-title">${game.name}</div>
          </div>
          <div class="game-card-body">
            <div class="game-card-meta">
              <span class="badge ${levelBadge}">${game.level}</span>
              <span class="badge">${game.category}</span>
            </div>
            <a href="${game.file}" class="play-btn">▶️ Speel Nu</a>
          </div>
        `;

        gameGrid.appendChild(card);
      });
    }

    function filterGames() {
      let filtered = games;

      // Filter op categorie
      if (currentFilter !== 'all') {
        filtered = filtered.filter(game => game.tags.includes(currentFilter));
      }

      // Filter op zoekterm
      const searchTerm = searchInput.value.toLowerCase();
      if (searchTerm) {
        filtered = filtered.filter(game =>
          game.name.toLowerCase().includes(searchTerm) ||
          game.category.toLowerCase().includes(searchTerm) ||
          game.tags.some(tag => tag.includes(searchTerm))
        );
      }

      renderGames(filtered);
      document.getElementById('gameCount').textContent = `${filtered.length} spel${filtered.length !== 1 ? 'len' : ''}`;
    }

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        filterGames();
      });
    });

    searchInput.addEventListener('input', filterGames);

    // Initial render
    renderGames();
  </script>
</body>
</html>
